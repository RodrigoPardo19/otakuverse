name: Build and Test

on:
  push:
    branches: [ "main", "feat/**" ]
  pull_request:
    branches: [ "main" ]
    types: [ opened, edited, synchronize ]

jobs:
  build:
    name: Build and Test
    timeout-minutes: 15
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - "5432:5432"
        options: >
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build
        run: ./gradlew build --info
        env:
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_NAME: test_db
          DB_HOST: localhost
          DB_PORT: 5432

      - name: Run Tests
        run: ./gradlew test --info
        env:
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_NAME: test_db
          DB_HOST: localhost
          DB_PORT: 5432
